<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Status Pages – Create public status pages for your services.">
    <title>Status Pages – Uptime</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="app-shell" class="app-shell">
        <aside id="sidebar" class="sidebar"></aside>
        <main id="main-content" class="main-content">
            <header id="topbar" class="topbar"></header>
            <div class="page-container">
                <section class="page active">
                    <div class="page-header">
                        <div><h1 class="page-title">Status Pages</h1><p class="page-desc">Public status pages for your services</p></div>
                        <button class="btn btn-primary" id="status-add-btn"><svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M12 4V20M20 12H4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg> Create Page</button>
                    </div>
                    <div class="status-pages-grid" id="status-pages-grid"></div>
                </section>
            </div>
        </main>
    </div>
    <div id="modal-overlay" class="modal-overlay"><div class="modal" id="modal-box"><div class="modal-header"><h2 class="modal-title" id="modal-title">Modal</h2><button class="modal-close" id="modal-close">&times;</button></div><div class="modal-body" id="modal-body"></div><div class="modal-footer" id="modal-footer"><button class="btn btn-ghost" id="modal-cancel">Cancel</button><button class="btn btn-primary" id="modal-confirm">Confirm</button></div></div></div>
    <div id="toast-container" class="toast-container"></div>
    <script src="js/data.js"></script>
    <script src="js/common.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            App.init('status-pages');

            document.getElementById('status-pages-grid').innerHTML = DATA.statusPages.map(sp => `
                <div class="status-page-card">
                    <div class="status-page-header">
                        <div><div class="status-page-name">${sp.name}</div><div class="status-page-url">${sp.url}</div></div>
                        <span class="status-page-badge ${sp.status}">${App.capitalize(sp.status)}</span>
                    </div>
                    <div class="status-page-monitors">${sp.monitors.map(m => `<span class="status-page-monitor-tag"><span class="status-dot up" style="width:6px;height:6px"></span>${m}</span>`).join('')}</div>
                    <div class="status-page-actions">
                        <button class="btn btn-sm btn-outline" onclick="showToast('Edit page','info')">Edit</button>
                        <button class="btn btn-sm btn-outline" onclick="showToast('Opening status page','info')">View Page</button>
                        <button class="btn btn-sm btn-danger" onclick="showToast('Status page deleted','error')">Delete</button>
                    </div>
                </div>`).join('');

            document.getElementById('status-add-btn').onclick = () => {
                App.openModal('Create Status Page', `
                    <div class="form-group" style="margin-bottom:16px"><label>Page Name</label><input type="text" placeholder="My Status Page"></div>
                    <div class="form-group" style="margin-bottom:16px"><label>Custom Domain</label><input type="text" placeholder="status.yourdomain.com"></div>
                    <div class="form-group" style="margin-bottom:16px"><label>Visibility</label><select><option>Public</option><option>Private</option></select></div>
                    <div class="form-group"><label>Monitors</label>${DATA.monitors.slice(0, 6).map(m => `<label class="checkbox-label" style="margin-top:6px"><input type="checkbox" ${Math.random() > 0.5 ? 'checked' : ''}> ${m.name}</label>`).join('')}</div>
                `, () => App.showToast('Status page created!', 'success'), 'Create Page');
            };
        });
    </script>
</body>
</html>
