<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="All Incidents – Review and manage all incident reports.">
    <title>All Incidents – Uptime</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="app-shell" class="app-shell">
        <aside id="sidebar" class="sidebar"></aside>
        <main id="main-content" class="main-content">
            <header id="topbar" class="topbar"></header>
            <div class="page-container">
                <section class="page active">
                    <div class="page-header">
                        <div><h1 class="page-title">Incident Management</h1><p class="page-desc">Review and manage all incident reports</p></div>
                    </div>
                    <div class="card">
                        <div class="table-responsive">
                            <table class="data-table">
                                <thead><tr><th>Title</th><th>Monitor</th><th>Reporter</th><th>Severity</th><th>Duration</th><th>Status</th><th>Actions</th></tr></thead>
                                <tbody id="incidents-tbody"></tbody>
                            </table>
                        </div>
                    </div>
                </section>
            </div>
        </main>
    </div>
    <div id="modal-overlay" class="modal-overlay"><div class="modal" id="modal-box"><div class="modal-header"><h2 class="modal-title" id="modal-title">Modal</h2><button class="modal-close" id="modal-close">&times;</button></div><div class="modal-body" id="modal-body"></div><div class="modal-footer" id="modal-footer"><button class="btn btn-ghost" id="modal-cancel">Cancel</button><button class="btn btn-primary" id="modal-confirm">Confirm</button></div></div></div>
    <div id="toast-container" class="toast-container"></div>
    <script src="js/data.js"></script>
    <script src="js/common.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            App.init('admin-incidents');
            document.getElementById('incidents-tbody').innerHTML = DATA.incidents.map(inc => `
                <tr>
                    <td style="font-weight:500">${inc.title}</td>
                    <td>${inc.monitor}</td>
                    <td>${inc.reporter}</td>
                    <td><span class="badge ${inc.severity === 'critical' ? 'badge-danger' : inc.severity === 'major' ? 'badge-warning' : 'badge-info'}">${App.capitalize(inc.severity)}</span></td>
                    <td>${inc.duration}</td>
                    <td><span class="badge ${inc.status === 'resolved' ? 'badge-success' : inc.status === 'ongoing' ? 'badge-danger' : 'badge-warning'}">${App.capitalize(inc.status)}</span></td>
                    <td><div class="table-actions"><button class="table-action-btn" onclick="showToast('Edit incident','info')">Edit</button><button class="table-action-btn danger" onclick="showToast('Incident removed','error')">Delete</button></div></td>
                </tr>`).join('');
        });
    </script>
</body>
</html>
