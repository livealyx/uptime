<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Monitor Details – In-depth uptime, performance and SSL analytics.">
    <title>Monitor Details – Uptime</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="app-shell" class="app-shell">
        <aside id="sidebar" class="sidebar"></aside>
        <main id="main-content" class="main-content">
            <header id="topbar" class="topbar"></header>
            <div class="page-container">
                <section class="page active">
                    <div class="page-header">
                        <a href="monitors.html" class="btn btn-ghost"><svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M15 6L9 12L15 18" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg> Back</a>
                        <div class="page-header-actions">
                            <button class="btn btn-outline" id="monitor-pause-btn">Pause</button>
                            <button class="btn btn-danger" id="monitor-delete-btn">Delete</button>
                        </div>
                    </div>
                    <div id="monitor-detail-content"></div>
                </section>
            </div>
        </main>
    </div>
    <div id="modal-overlay" class="modal-overlay"><div class="modal" id="modal-box"><div class="modal-header"><h2 class="modal-title" id="modal-title">Modal</h2><button class="modal-close" id="modal-close">&times;</button></div><div class="modal-body" id="modal-body"></div><div class="modal-footer" id="modal-footer"><button class="btn btn-ghost" id="modal-cancel">Cancel</button><button class="btn btn-primary" id="modal-confirm">Confirm</button></div></div></div>
    <div id="toast-container" class="toast-container"></div>
    <script src="js/data.js"></script>
    <script src="js/common.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            App.init('monitor-detail');

            const params = new URLSearchParams(window.location.search);
            const id = parseInt(params.get('id')) || 1;
            const m = DATA.monitors.find(mon => mon.id === id) || DATA.monitors[0];

            document.title = m.name + ' – Uptime';

            document.getElementById('monitor-detail-content').innerHTML = `
                <div class="monitor-detail-header">
                    <div class="monitor-detail-icon ${m.status}">${m.status === 'up' ? '✓' : m.status === 'down' ? '✕' : '❚❚'}</div>
                    <div>
                        <div class="monitor-detail-title">${m.name}</div>
                        <div class="monitor-detail-url">${m.url} · Last checked ${m.lastCheck}</div>
                    </div>
                </div>
                <div class="monitor-detail-stats">
                    <div class="detail-stat"><div class="detail-stat-label">Current Status</div><div class="detail-stat-value" style="color:${m.status === 'up' ? 'var(--green)' : 'var(--red)'}">${App.capitalize(m.status)}</div></div>
                    <div class="detail-stat"><div class="detail-stat-label">Uptime (30d)</div><div class="detail-stat-value">${m.uptime}%</div></div>
                    <div class="detail-stat"><div class="detail-stat-label">Avg Response</div><div class="detail-stat-value">${m.responseTime > 0 ? m.responseTime + 'ms' : '—'}</div></div>
                    <div class="detail-stat"><div class="detail-stat-label">Total Checks</div><div class="detail-stat-value">${m.checks.toLocaleString()}</div></div>
                    <div class="detail-stat"><div class="detail-stat-label">SSL Status</div><div class="detail-stat-value" style="color:${m.sslValid ? 'var(--green)' : 'var(--red)'}">${m.sslValid ? 'Valid' : 'Expired'}</div></div>
                    <div class="detail-stat"><div class="detail-stat-label">SSL Expiry</div><div class="detail-stat-value">${m.sslExpiry}</div></div>
                </div>
                <div class="ssl-info">
                    <div class="ssl-badge"><div class="ssl-dot" style="background:${m.sslValid ? 'var(--green)' : 'var(--red)'}"></div> SSL Certificate: ${m.sslValid ? 'Active & Valid' : 'Expired – Renew Now'}</div>
                    <div class="ssl-badge">Protocol: TLS 1.3</div>
                    <div class="ssl-badge">Issuer: Let's Encrypt</div>
                </div>
                <div class="card">
                    <div class="card-header"><h3 class="card-title">Response Time History</h3><select class="select-sm"><option>24 Hours</option><option>7 Days</option><option>30 Days</option></select></div>
                    <div class="chart-wrapper"><canvas id="detail-response-chart" height="200"></canvas></div>
                </div>
                <div class="grid-2col">
                    <div class="card">
                        <div class="card-header"><h3 class="card-title">Uptime Timeline (30d)</h3></div>
                        <div class="card-body">
                            <div class="uptime-bar" style="height:36px">${App.uptimeBars(60)}</div>
                            <div style="display:flex;justify-content:space-between;margin-top:8px;font-size:0.7rem;color:var(--text-tertiary)"><span>30 days ago</span><span>Today</span></div>
                        </div>
                    </div>
                    <div class="card">
                        <div class="card-header"><h3 class="card-title">Recent Incidents</h3></div>
                        <div class="card-body">${DATA.incidents.filter(i => i.monitor === m.name).slice(0, 3).map(inc => `
                            <div class="dash-incident-item">
                                <div class="dash-incident-dot" style="background:${inc.severity === 'critical' ? 'var(--red)' : 'var(--yellow)'}"></div>
                                <div class="dash-incident-info"><div class="dash-incident-name">${inc.title}</div><div class="dash-incident-time">${inc.startedAt}</div></div>
                            </div>`).join('') || '<div class="empty-state"><div class="empty-state-desc">No incidents recorded</div></div>'}</div>
                    </div>
                </div>`;

            document.getElementById('monitor-pause-btn').onclick = () => App.showToast('Monitor "' + m.name + '" paused', 'warning');
            document.getElementById('monitor-delete-btn').onclick = () => {
                App.openModal('Delete Monitor', '<p style="color:var(--text-secondary)">Are you sure you want to delete "' + m.name + '"? This cannot be undone.</p>', () => {
                    App.showToast('Monitor deleted', 'error');
                    setTimeout(() => window.location.href = 'monitors.html', 800);
                }, 'Delete');
            };

            setTimeout(() => App.drawResponseChart('detail-response-chart', m.responseTime || 140), 100);
        });
    </script>
</body>
</html>
