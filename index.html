<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Uptime – Sign in to your website uptime monitoring dashboard.">
    <title>Sign In – Uptime</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div id="auth-screen" class="auth-screen">
        <div class="auth-bg-effects">
            <div class="auth-orb auth-orb-1"></div>
            <div class="auth-orb auth-orb-2"></div>
            <div class="auth-orb auth-orb-3"></div>
            <div class="auth-grid-overlay"></div>
        </div>

        <!-- Login -->
        <div id="login-view" class="auth-card">
            <div class="auth-logo">
                <div class="auth-logo-icon">
                    <svg viewBox="0 0 32 32" fill="none"><circle cx="16" cy="16" r="14" stroke="url(#lg1)" stroke-width="2.5"/><path d="M10 16l4 4 8-8" stroke="url(#lg1)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/><defs><linearGradient id="lg1" x1="0" y1="0" x2="32" y2="32"><stop stop-color="#4f46e5"/><stop offset="1" stop-color="#6366f1"/></linearGradient></defs></svg>
                </div>
                <span class="auth-logo-text">Uptime</span>
            </div>
            <h1 class="auth-title">Welcome back</h1>
            <p class="auth-subtitle">Sign in to your monitoring dashboard</p>
            <form id="login-form" class="auth-form">
                <div class="form-group">
                    <label for="login-email">Email address</label>
                    <input type="email" id="login-email" placeholder="you@company.com" required>
                </div>
                <div class="form-group">
                    <label for="login-password">Password</label>
                    <input type="password" id="login-password" placeholder="••••••••" required>
                </div>
                <div class="form-row">
                    <label class="checkbox-label"><input type="checkbox" checked> Remember me</label>
                    <a href="#" class="auth-link">Forgot password?</a>
                </div>
                <button type="submit" class="btn btn-primary btn-full" id="login-btn">Sign In</button>
            </form>
            <p class="auth-footer">Don't have an account? <a href="#" id="show-register" class="auth-link">Create one</a></p>
        </div>

        <!-- Register -->
        <div id="register-view" class="auth-card" style="display:none;">
            <div class="auth-logo">
                <div class="auth-logo-icon">
                    <svg viewBox="0 0 32 32" fill="none"><circle cx="16" cy="16" r="14" stroke="url(#lg2)" stroke-width="2.5"/><path d="M10 16l4 4 8-8" stroke="url(#lg2)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/><defs><linearGradient id="lg2" x1="0" y1="0" x2="32" y2="32"><stop stop-color="#4f46e5"/><stop offset="1" stop-color="#6366f1"/></linearGradient></defs></svg>
                </div>
                <span class="auth-logo-text">Uptime</span>
            </div>
            <h1 class="auth-title">Create account</h1>
            <p class="auth-subtitle">Start monitoring your websites today</p>
            <form id="register-form" class="auth-form">
                <div class="form-group">
                    <label for="reg-name">Full name</label>
                    <input type="text" id="reg-name" placeholder="John Doe" required>
                </div>
                <div class="form-group">
                    <label for="reg-email">Email address</label>
                    <input type="email" id="reg-email" placeholder="you@company.com" required>
                </div>
                <div class="form-group">
                    <label for="reg-password">Password</label>
                    <input type="password" id="reg-password" placeholder="Min 8 characters" required>
                </div>
                <label class="checkbox-label"><input type="checkbox" required> I agree to the <a href="#" class="auth-link">Terms of Service</a></label>
                <button type="submit" class="btn btn-primary btn-full" id="register-btn">Create Account</button>
            </form>
            <p class="auth-footer">Already have an account? <a href="#" id="show-login" class="auth-link">Sign in</a></p>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('login-form').addEventListener('submit', (e) => {
                e.preventDefault();
                window.location.href = 'dashboard.html';
            });
            document.getElementById('register-form').addEventListener('submit', (e) => {
                e.preventDefault();
                window.location.href = 'dashboard.html';
            });
            document.getElementById('show-register').addEventListener('click', (e) => {
                e.preventDefault();
                document.getElementById('login-view').style.display = 'none';
                document.getElementById('register-view').style.display = 'block';
            });
            document.getElementById('show-login').addEventListener('click', (e) => {
                e.preventDefault();
                document.getElementById('register-view').style.display = 'none';
                document.getElementById('login-view').style.display = 'block';
            });
        });
    </script>
</body>
</html>
