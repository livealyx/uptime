<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Payments Management – View and manage all transactions.">
    <title>Payments Management – Uptime</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="app-shell" class="app-shell">
        <aside id="sidebar" class="sidebar"></aside>
        <main id="main-content" class="main-content">
            <header id="topbar" class="topbar"></header>
            <div class="page-container">
                <section class="page active">
                    <div class="page-header">
                        <div><h1 class="page-title">Payments Management</h1><p class="page-desc">View and manage all transactions</p></div>
                    </div>
                    <div class="card">
                        <div class="table-responsive">
                            <table class="data-table" id="admin-payments-table">
                                <thead><tr><th>ID</th><th>User</th><th>Amount</th><th>Gateway</th><th>Date</th><th>Status</th><th>Actions</th></tr></thead>
                                <tbody></tbody>
                            </table>
                        </div>
                    </div>
                </section>
            </div>
        </main>
    </div>
    <div id="modal-overlay" class="modal-overlay"><div class="modal" id="modal-box"><div class="modal-header"><h2 class="modal-title" id="modal-title">Modal</h2><button class="modal-close" id="modal-close">&times;</button></div><div class="modal-body" id="modal-body"></div><div class="modal-footer" id="modal-footer"><button class="btn btn-ghost" id="modal-cancel">Cancel</button><button class="btn btn-primary" id="modal-confirm">Confirm</button></div></div></div>
    <div id="toast-container" class="toast-container"></div>
    <script src="js/data.js"></script>
    <script src="js/common.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            App.init('admin-payments');
            document.querySelector('#admin-payments-table tbody').innerHTML = DATA.payments.map(p => `
                <tr>
                    <td style="font-family:monospace;font-size:0.8rem;color:var(--text-tertiary)">${p.id}</td>
                    <td>${p.user}</td>
                    <td style="font-weight:600">${p.amount}</td>
                    <td>${p.gateway}</td>
                    <td>${p.date}</td>
                    <td><span class="badge ${p.status === 'completed' ? 'badge-success' : p.status === 'pending' ? 'badge-warning' : 'badge-danger'}">${App.capitalize(p.status)}</span></td>
                    <td><div class="table-actions">${p.status === 'pending' ? '<button class="table-action-btn" onclick="showToast(\'Payment approved\',\'success\')">Approve</button><button class="table-action-btn danger" onclick="showToast(\'Payment declined\',\'error\')">Decline</button>' : '<button class="table-action-btn" onclick="showToast(\'Viewing details\',\'info\')">View</button>'}</div></td>
                </tr>`).join('');
        });
    </script>
</body>
</html>
