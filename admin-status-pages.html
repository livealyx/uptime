<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="All Status Pages – Manage all status pages across the platform.">
    <title>All Status Pages – Uptime</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="app-shell" class="app-shell">
        <aside id="sidebar" class="sidebar"></aside>
        <main id="main-content" class="main-content">
            <header id="topbar" class="topbar"></header>
            <div class="page-container">
                <section class="page active">
                    <div class="page-header">
                        <div><h1 class="page-title">Status Pages Management</h1><p class="page-desc">Manage all status pages platform-wide</p></div>
                    </div>
                    <div class="card">
                        <div class="table-responsive">
                            <table class="data-table">
                                <thead><tr><th>Name</th><th>Owner</th><th>URL</th><th>Monitors</th><th>Visibility</th><th>Actions</th></tr></thead>
                                <tbody id="sp-tbody"></tbody>
                            </table>
                        </div>
                    </div>
                </section>
            </div>
        </main>
    </div>
    <div id="modal-overlay" class="modal-overlay"><div class="modal" id="modal-box"><div class="modal-header"><h2 class="modal-title" id="modal-title">Modal</h2><button class="modal-close" id="modal-close">&times;</button></div><div class="modal-body" id="modal-body"></div><div class="modal-footer" id="modal-footer"><button class="btn btn-ghost" id="modal-cancel">Cancel</button><button class="btn btn-primary" id="modal-confirm">Confirm</button></div></div></div>
    <div id="toast-container" class="toast-container"></div>
    <script src="js/data.js"></script>
    <script src="js/common.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            App.init('admin-status-pages');
            document.getElementById('sp-tbody').innerHTML = DATA.statusPages.map(sp => `
                <tr>
                    <td style="font-weight:500">${sp.name}</td>
                    <td>${sp.owner}</td>
                    <td><a href="#" style="color:var(--accent)">${sp.url}</a></td>
                    <td>${sp.monitors.length}</td>
                    <td><span class="badge ${sp.visibility === 'Public' ? 'badge-success' : 'badge-neutral'}">${sp.visibility}</span></td>
                    <td><div class="table-actions"><button class="table-action-btn" onclick="showToast('Edit status page','info')">Edit</button><button class="table-action-btn danger" onclick="showToast('Status page deleted','error')">Delete</button></div></td>
                </tr>`).join('');
        });
    </script>
</body>
</html>
