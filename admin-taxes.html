<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Tax Rates – Manage tax configurations for different regions.">
    <title>Tax Rates – Uptime</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="app-shell" class="app-shell">
        <aside id="sidebar" class="sidebar"></aside>
        <main id="main-content" class="main-content">
            <header id="topbar" class="topbar"></header>
            <div class="page-container">
                <section class="page active">
                    <div class="page-header">
                        <div><h1 class="page-title">Tax Rates</h1><p class="page-desc">Manage tax configurations</p></div>
                        <button class="btn btn-primary" onclick="showToast('Add tax rate modal','info')"><svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M12 4V20M20 12H4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg> Add Tax Rate</button>
                    </div>
                    <div class="card">
                        <div class="table-responsive">
                            <table class="data-table">
                                <thead><tr><th>Name</th><th>Region</th><th>Rate</th><th>Type</th><th>Status</th><th>Actions</th></tr></thead>
                                <tbody id="taxes-tbody"></tbody>
                            </table>
                        </div>
                    </div>
                </section>
            </div>
        </main>
    </div>
    <div id="modal-overlay" class="modal-overlay"><div class="modal" id="modal-box"><div class="modal-header"><h2 class="modal-title" id="modal-title">Modal</h2><button class="modal-close" id="modal-close">&times;</button></div><div class="modal-body" id="modal-body"></div><div class="modal-footer" id="modal-footer"><button class="btn btn-ghost" id="modal-cancel">Cancel</button><button class="btn btn-primary" id="modal-confirm">Confirm</button></div></div></div>
    <div id="toast-container" class="toast-container"></div>
    <script src="js/data.js"></script>
    <script src="js/common.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            App.init('admin-taxes');
            document.getElementById('taxes-tbody').innerHTML = DATA.taxRates.map(t => `
                <tr>
                    <td style="font-weight:500">${t.name}</td>
                    <td>${t.region}</td>
                    <td style="font-weight:600">${t.rate}</td>
                    <td>${t.type}</td>
                    <td><span class="badge ${t.status === 'active' ? 'badge-success' : 'badge-neutral'}">${App.capitalize(t.status)}</span></td>
                    <td><div class="table-actions"><button class="table-action-btn" onclick="showToast('Edit tax rate','info')">Edit</button><button class="table-action-btn danger" onclick="showToast('Tax rate removed','error')">Delete</button></div></td>
                </tr>`).join('');
        });
    </script>
</body>
</html>
