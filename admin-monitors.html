<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="All Monitors – Oversee all user-created monitors with complete control.">
    <title>All Monitors – Uptime</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="app-shell" class="app-shell">
        <aside id="sidebar" class="sidebar"></aside>
        <main id="main-content" class="main-content">
            <header id="topbar" class="topbar"></header>
            <div class="page-container">
                <section class="page active">
                    <div class="page-header">
                        <div><h1 class="page-title">Monitor Management</h1><p class="page-desc">Oversee all user-created monitors</p></div>
                    </div>
                    <div class="card">
                        <div class="table-responsive">
                            <table class="data-table">
                                <thead><tr><th>URL</th><th>Owner</th><th>Status</th><th>Uptime</th><th>Avg Response</th><th>Created</th><th>Actions</th></tr></thead>
                                <tbody id="monitors-tbody"></tbody>
                            </table>
                        </div>
                    </div>
                </section>
            </div>
        </main>
    </div>
    <div id="modal-overlay" class="modal-overlay"><div class="modal" id="modal-box"><div class="modal-header"><h2 class="modal-title" id="modal-title">Modal</h2><button class="modal-close" id="modal-close">&times;</button></div><div class="modal-body" id="modal-body"></div><div class="modal-footer" id="modal-footer"><button class="btn btn-ghost" id="modal-cancel">Cancel</button><button class="btn btn-primary" id="modal-confirm">Confirm</button></div></div></div>
    <div id="toast-container" class="toast-container"></div>
    <script src="js/data.js"></script>
    <script src="js/common.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            App.init('admin-monitors');
            document.getElementById('monitors-tbody').innerHTML = DATA.monitors.map(m => `
                <tr>
                    <td><a href="monitor-detail.html?id=${m.id}" style="color:var(--accent);font-weight:500">${m.url}</a></td>
                    <td>${m.owner}</td>
                    <td><span class="badge ${m.status === 'up' ? 'badge-success' : m.status === 'down' ? 'badge-danger' : 'badge-warning'}">${App.capitalize(m.status)}</span></td>
                    <td style="font-weight:600">${m.uptime}%</td>
                    <td>${m.responseTime > 0 ? m.responseTime + 'ms' : '—'}</td>
                    <td>2026-01-15</td>
                    <td><div class="table-actions"><button class="table-action-btn" onclick="showToast('Edit monitor','info')">Edit</button><button class="table-action-btn danger" onclick="showToast('Monitor removed','error')">Delete</button></div></td>
                </tr>`).join('');
        });
    </script>
</body>
</html>
